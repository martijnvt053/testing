<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Seminar Aantekeningen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #1a56db;
      --accent-light: #e8f0fe;
      --bg: #f5f7fa;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1a202c;
      --muted: #718096;
      --danger: #e53e3e;
      --success: #38a169;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* Header */
    header {
      background: var(--accent);
      color: white;
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .toolbar button {
      white-space: nowrap;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: white;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
    }
    .toolbar button.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .toolbar button:active { opacity: 0.7; }

    /* Blocks */
    .blocks { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }

    .block {
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .block-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      background: var(--accent-light);
      border-bottom: 1px solid var(--border);
      gap: 8px;
      cursor: pointer;
    }
    .block-number {
      background: var(--accent);
      color: white;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .block-title-input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      outline: none;
      min-width: 0;
    }
    .block-title-input::placeholder { color: var(--muted); font-weight: 400; }

    .block-actions { display: flex; gap: 4px; }
    .icon-btn {
      background: none;
      border: none;
      padding: 6px;
      cursor: pointer;
      border-radius: 6px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .icon-btn:active { background: rgba(0,0,0,0.07); }
    .icon-btn.delete { color: var(--danger); }

    .block-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
    .block-body.collapsed { display: none; }

    /* Notes */
    .note {
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      position: relative;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    .note-bullet {
      color: var(--accent);
      font-size: 18px;
      line-height: 1.3;
      flex-shrink: 0;
    }
    .note textarea {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      resize: none;
      outline: none;
      min-height: 40px;
      font-family: inherit;
      overflow: hidden;
    }
    .note-del {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
      align-self: flex-start;
    }
    .note-del:active { color: var(--danger); }

    /* Add note button */
    .add-note-btn {
      width: 100%;
      padding: 9px;
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      background: none;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .add-note-btn:active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }
    .empty .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 14px; }

    /* Export modal */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .overlay.open { display: flex; }
    .sheet {
      background: white;
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-height: 85vh;
      padding: 20px;
      overflow-y: auto;
    }
    .sheet h2 { font-size: 16px; margin-bottom: 12px; }
    .sheet pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 55vh;
      overflow-y: auto;
    }
    .sheet-actions { display: flex; gap: 8px; margin-top: 14px; }
    .sheet-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-copy { background: var(--accent); color: white; }
    .btn-close { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
    .btn-copy:active, .btn-close:active { opacity: 0.7; }
    .copy-ok { color: var(--success); font-size: 12px; text-align: center; margin-top: 8px; display: none; }

    /* Drag hint */
    .drag-hint {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding: 6px;
    }
  </style>
</head>
<body>

<header>
  <h1>📓 Seminar Aantekeningen</h1>
  <p id="header-date">Ben Tichelaar MBA</p>
</header>

<div class="toolbar">
  <button class="primary" onclick="addBlock()">＋ Nieuw blok</button>
  <button onclick="collapseAll()">▲ Alles inklappen</button>
  <button onclick="expandAll()">▼ Alles uitklappen</button>
  <button onclick="openExport()">↗ Exporteer</button>
</div>

<div class="blocks" id="blocks"></div>

<div class="overlay" id="export-overlay" onclick="closeExportIfOutside(event)">
  <div class="sheet">
    <h2>📋 Exporteer aantekeningen</h2>
    <pre id="export-text"></pre>
    <p class="copy-ok" id="copy-ok">✓ Gekopieerd naar klembord!</p>
    <div class="sheet-actions">
      <button class="btn-copy" onclick="copyExport()">Kopieer tekst</button>
      <button class="btn-close" onclick="closeExport()">Sluiten</button>
    </div>
  </div>
</div>

<script>
  // ─── State ───────────────────────────────────────────────────────────────
  let blocks = [];

  function load() {
    const saved = localStorage.getItem('seminar-blocks');
    if (saved) {
      blocks = JSON.parse(saved);
    } else {
      // Default starter blocks
      blocks = [
        { id: uid(), title: 'Introductie', notes: [], collapsed: false },
        { id: uid(), title: 'Ochtend sessie', notes: [], collapsed: false },
        { id: uid(), title: 'Middag sessie', notes: [], collapsed: false },
        { id: uid(), title: 'Key takeaways', notes: [], collapsed: false },
        { id: uid(), title: 'Actiepunten', notes: [], collapsed: false },
      ];
      save();
    }
    render();
  }

  function save() {
    localStorage.setItem('seminar-blocks', JSON.stringify(blocks));
  }

  function uid() {
    return Math.random().toString(36).slice(2, 9);
  }

  // ─── Blocks ──────────────────────────────────────────────────────────────
  function addBlock() {
    const block = { id: uid(), title: '', notes: [], collapsed: false };
    blocks.push(block);
    save();
    render();
    // Focus the new block's title
    setTimeout(() => {
      const inputs = document.querySelectorAll('.block-title-input');
      if (inputs.length) inputs[inputs.length - 1].focus();
    }, 50);
  }

  function deleteBlock(id) {
    if (!confirm('Blok verwijderen?')) return;
    blocks = blocks.filter(b => b.id !== id);
    save();
    render();
  }

  function toggleBlock(id) {
    const b = blocks.find(b => b.id === id);
    if (b) b.collapsed = !b.collapsed;
    save();
    render();
  }

  function updateTitle(id, val) {
    const b = blocks.find(b => b.id === id);
    if (b) b.title = val;
    save();
  }

  function collapseAll() {
    blocks.forEach(b => b.collapsed = true);
    save();
    render();
  }

  function expandAll() {
    blocks.forEach(b => b.collapsed = false);
    save();
    render();
  }

  // ─── Notes ───────────────────────────────────────────────────────────────
  function addNote(blockId) {
    const b = blocks.find(b => b.id === blockId);
    if (!b) return;
    const note = { id: uid(), text: '' };
    b.notes.push(note);
    save();
    render();
    setTimeout(() => {
      const textareas = document.querySelectorAll(`[data-block="${blockId}"] textarea`);
      if (textareas.length) textareas[textareas.length - 1].focus();
    }, 50);
  }

  function deleteNote(blockId, noteId) {
    const b = blocks.find(b => b.id === blockId);
    if (b) b.notes = b.notes.filter(n => n.id !== noteId);
    save();
    render();
  }

  function updateNote(blockId, noteId, val) {
    const b = blocks.find(b => b.id === blockId);
    if (!b) return;
    const n = b.notes.find(n => n.id === noteId);
    if (n) n.text = val;
    save();
  }

  function autoResize(ta) {
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  }

  // ─── Render ──────────────────────────────────────────────────────────────
  function render() {
    const container = document.getElementById('blocks');
    if (blocks.length === 0) {
      container.innerHTML = `
        <div class="empty">
          <div class="emoji">📝</div>
          <p>Nog geen blokken.<br>Tik op "+ Nieuw blok" om te beginnen.</p>
        </div>`;
      return;
    }

    container.innerHTML = blocks.map((b, i) => `
      <div class="block" data-block="${b.id}">
        <div class="block-header" onclick="toggleBlock('${b.id}')">
          <div class="block-number">${i + 1}</div>
          <input
            class="block-title-input"
            type="text"
            placeholder="Onderwerp naam..."
            value="${escHtml(b.title)}"
            onclick="event.stopPropagation()"
            oninput="updateTitle('${b.id}', this.value)"
          />
          <div class="block-actions" onclick="event.stopPropagation()">
            <button class="icon-btn" onclick="toggleBlock('${b.id}')" title="In/uitklappen">
              ${b.collapsed ? '▼' : '▲'}
            </button>
            <button class="icon-btn delete" onclick="deleteBlock('${b.id}')" title="Verwijder blok">✕</button>
          </div>
        </div>
        <div class="block-body ${b.collapsed ? 'collapsed' : ''}">
          ${b.notes.map(n => `
            <div class="note">
              <span class="note-bullet">•</span>
              <textarea
                placeholder="Schrijf hier je aantekening..."
                oninput="updateNote('${b.id}', '${n.id}', this.value); autoResize(this)"
                onfocus="autoResize(this)"
                onkeydown="handleNoteKey(event, '${b.id}', '${n.id}')"
              >${escHtml(n.text)}</textarea>
              <button class="note-del" onclick="deleteNote('${b.id}', '${n.id}')" title="Verwijder">✕</button>
            </div>
          `).join('')}
          <button class="add-note-btn" onclick="addNote('${b.id}')">
            ＋ Aantekening toevoegen
          </button>
        </div>
      </div>
    `).join('');

    // Restore textarea heights
    document.querySelectorAll('.note textarea').forEach(ta => {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    });
  }

  function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enter key creates new note in same block
  function handleNoteKey(e, blockId, noteId) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      addNote(blockId);
    }
  }

  // ─── Export ──────────────────────────────────────────────────────────────
  function openExport() {
    const date = new Date().toLocaleDateString('nl-NL', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    let txt = `SEMINAR AANTEKENINGEN — Ben Tichelaar MBA\n${date}\n`;
    txt += '═'.repeat(50) + '\n\n';

    blocks.forEach((b, i) => {
      txt += `${i + 1}. ${b.title || '(naamloos blok)'}\n`;
      txt += '─'.repeat(40) + '\n';
      if (b.notes.length === 0) {
        txt += '  (geen aantekeningen)\n';
      } else {
        b.notes.forEach(n => {
          txt += `  • ${n.text || ''}\n`;
        });
      }
      txt += '\n';
    });

    document.getElementById('export-text').textContent = txt;
    document.getElementById('copy-ok').style.display = 'none';
    document.getElementById('export-overlay').classList.add('open');
  }

  function closeExport() {
    document.getElementById('export-overlay').classList.remove('open');
  }

  function closeExportIfOutside(e) {
    if (e.target === document.getElementById('export-overlay')) closeExport();
  }

  function copyExport() {
    const text = document.getElementById('export-text').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const ok = document.getElementById('copy-ok');
      ok.style.display = 'block';
      setTimeout(() => ok.style.display = 'none', 2500);
    }).catch(() => {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      const ok = document.getElementById('copy-ok');
      ok.style.display = 'block';
      setTimeout(() => ok.style.display = 'none', 2500);
    });
  }

  // ─── Date in header ──────────────────────────────────────────────────────
  const today = new Date().toLocaleDateString('nl-NL', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  document.getElementById('header-date').textContent = `Ben Tichelaar MBA — ${today}`;

  // ─── Init ─────────────────────────────────────────────────────────────────
  load();
</script>
</body>
</html>
